<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e94560">
  <meta name="description" content="Film Club Hub - Weekly film club management">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Film Club Hub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <span class="header__icon">&#127916;</span>
        <div>
          <div class="header__title">Film Club Hub</div>
          <div class="header__subtitle">Weekly Screening &amp; Discussion</div>
        </div>
      </div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
      <div class="nav__item nav__item--active" data-section="dashboard">
        <span class="nav__label">Dashboard</span>
      </div>
      <div class="nav__item" data-section="schedule">
        <span class="nav__label">Schedule</span>
      </div>
      <div class="nav__item" data-section="admin">
        <span class="nav__label">Admin</span>
      </div>
      <div class="nav__item" data-section="history">
        <span class="nav__label">History</span>
      </div>
      <div class="nav__item" data-section="announcements">
        <span class="nav__label">Announcements</span>
      </div>
      <div class="nav__item" data-section="settings">
        <span class="nav__label">Settings</span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main">

      <!-- Dashboard -->
      <section class="section section--active" id="section-dashboard">
        <h2 class="page-title">&#127968; Dashboard</h2>
        <div id="dashboard-content"></div>
      </section>

      <!-- Schedule -->
      <section class="section" id="section-schedule">
        <h2 class="page-title">&#128197; Hosting Schedule</h2>
        <div id="schedule-content"></div>
      </section>

      <!-- Admin -->
      <section class="section" id="section-admin">
        <h2 class="page-title">&#128188; Roles &amp; Tasks</h2>
        <div id="admin-content"></div>
      </section>

      <!-- History -->
      <section class="section" id="section-history">
        <h2 class="page-title">&#127902; History</h2>
        <div id="history-content"></div>
      </section>

      <!-- Announcements -->
      <section class="section" id="section-announcements">
        <h2 class="page-title">&#128227; Announcements</h2>
        <div id="announcements-content"></div>
      </section>

      <!-- Settings -->
      <section class="section" id="section-settings">
        <h2 class="page-title">&#9881; Settings</h2>
        <div id="settings-content"></div>
      </section>

    </main>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__header">
        <div class="modal__title" id="modal-title"></div>
        <button class="modal__close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
